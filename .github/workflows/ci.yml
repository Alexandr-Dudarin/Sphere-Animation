name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    name: Unit tests and builds
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: sphere-visual-lab

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sphere-visual-lab/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests and builds
        run: npm run check:all

  e2e:
    name: Playwright E2E
    needs: checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: sphere-visual-lab

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sphere-visual-lab/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            sphere-visual-lab/playwright-report
            sphere-visual-lab/test-results
          if-no-files-found: ignore
          retention-days: 7

  consumer:
    name: Consumer package smoke test
    needs: checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: sphere-visual-lab

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sphere-visual-lab/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test package in clean consumer project
        run: node ./scripts/run-consumer-smoke.mjs